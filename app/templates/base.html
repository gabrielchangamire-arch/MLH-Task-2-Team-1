<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Personal Portfolio">
    <meta property="og:description" content="My Personal Portfolio">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
    <title>{% block title %}{{ title }}{% endblock %}</title>
</head>

<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a href="{{ url_for('index') }}">
                <div class="nav-logo">
                    <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Site logo">
                </div>
            </a>
            <nav class="nav-links">
                {% for page in nav_pages %}
                <a href="{{ url_for(page.endpoint) }}"
                   class="nav-link{% if request.endpoint == page.endpoint %} nav-link-active{% endif %}">
                    {{ page.label }}
                </a>
                {% endfor %}
            </nav>
        </div>
    </header>

    {% block content %}{% endblock %}
    {# Optional per-page scripts without duplicating the full base layout. #}
    {% block scripts %}{% endblock %}
</body>

</html>
