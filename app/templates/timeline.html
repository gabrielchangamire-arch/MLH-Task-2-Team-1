{% extends "base.html" %}

{% block title %}Timeline{% endblock %}

{% block content %}
<style>
    .timeline-intro {
        color: #555555;
        font-size: 18px;
        margin: -16px 0 36px;
    }

    .timeline-layout {
        display: grid;
        grid-template-columns: minmax(280px, 420px) 1fr;
        gap: 32px;
        align-items: start;
    }

    .timeline-form,
    .timeline-feed {
        background-color: #ffffff;
        border-radius: 16px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
    }

    .timeline-form {
        padding: 24px;
        border-top: 4px solid #1d539f;
    }

    .timeline-label {
        display: block;
        color: #15233d;
        font-size: 14px;
        font-weight: 700;
        margin: 0 0 8px;
    }

    .timeline-input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ccd3df;
        border-radius: 8px;
        color: #15233d;
        font: inherit;
        font-size: 15px;
        margin: 0 0 18px;
        padding: 12px 14px;
    }

    .timeline-input:focus {
        border-color: #1d539f;
        box-shadow: 0 0 0 3px rgba(29, 83, 159, 0.14);
        outline: none;
    }

    .timeline-textarea {
        min-height: 140px;
        resize: vertical;
    }

    .timeline-submit {
        background-color: #1d539f;
        border: none;
        border-radius: 8px;
        color: #ffffff;
        cursor: pointer;
        font-size: 15px;
        font-weight: 700;
        padding: 12px 18px;
    }

    .timeline-submit:hover {
        background-color: #16427f;
    }

    .timeline-message {
        color: #555555;
        font-size: 14px;
        margin: 14px 0 0;
        min-height: 20px;
    }

    .timeline-feed {
        padding: 24px;
    }

    .timeline-feed-heading {
        color: #15233d;
        font-size: 26px;
        font-weight: 700;
        margin: 0 0 20px;
    }

    .timeline-posts {
        display: flex;
        flex-direction: column;
        gap: 18px;
    }

    .timeline-post {
        background-color: #f7f8fb;
        border-left: 4px solid #1d539f;
        border-radius: 12px;
        padding: 16px 18px;
    }

    .timeline-post-meta {
        color: #15233d;
        font-size: 16px;
        font-weight: 700;
        margin: 0 0 3px;
    }

    .timeline-post-email {
        color: #8a93a6;
        font-size: 13px;
        margin: 0 0 10px;
    }

    .timeline-post-content {
        color: #444c5c;
        font-size: 15px;
        line-height: 1.6;
        margin: 0;
        white-space: pre-wrap;
    }

    .timeline-empty {
        color: #555555;
        font-size: 15px;
        margin: 0;
    }

    @media (max-width: 900px) {
        .timeline-layout {
            grid-template-columns: 1fr;
        }
    }
</style>

<section class="page-content timeline-page">
    <h1 class="page-heading">Timeline</h1>
    <p class="timeline-intro">Share an update from your school, career, or project journey.</p>

    <div class="timeline-layout">
        <form class="timeline-form" id="timeline-form">
            <label class="timeline-label" for="timeline-name">Name</label>
            <input class="timeline-input" id="timeline-name" name="name" type="text" required>

            <label class="timeline-label" for="timeline-email">Email</label>
            <input class="timeline-input" id="timeline-email" name="email" type="email" required>

            <label class="timeline-label" for="timeline-content">Update</label>
            <textarea class="timeline-input timeline-textarea" id="timeline-content" name="content" rows="5" required></textarea>

            <button class="timeline-submit" type="submit">Post Update</button>
            <p class="timeline-message" id="timeline-message" aria-live="polite"></p>
        </form>

        <section class="timeline-feed" aria-live="polite">
            <h2 class="timeline-feed-heading">Recent Posts</h2>
            <div class="timeline-posts" id="timeline-posts"></div>
        </section>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script>
const form = document.querySelector("#timeline-form");
const postsContainer = document.querySelector("#timeline-posts");
const message = document.querySelector("#timeline-message");

function formatDate(value) {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) {
        return value;
    }

    return date.toLocaleString([], {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit"
    });
}

function renderPosts(posts) {
    postsContainer.innerHTML = "";

    if (posts.length === 0) {
        const empty = document.createElement("p");
        empty.className = "timeline-empty";
        empty.textContent = "No timeline posts yet.";
        postsContainer.appendChild(empty);
        return;
    }

    posts.forEach((post) => {
        const article = document.createElement("article");
        article.className = "timeline-post";

        const meta = document.createElement("p");
        meta.className = "timeline-post-meta";
        meta.textContent = `${post.name} · ${formatDate(post.created_at)}`;

        const email = document.createElement("p");
        email.className = "timeline-post-email";
        email.textContent = post.email;

        const content = document.createElement("p");
        content.className = "timeline-post-content";
        content.textContent = post.content;

        article.append(meta, email, content);
        postsContainer.appendChild(article);
    });
}

async function loadPosts() {
    const response = await fetch("/api/timeline_post");
    const data = await response.json();
    renderPosts(data.timeline_posts);
}

form.addEventListener("submit", async (event) => {
    event.preventDefault();
    message.textContent = "Posting...";

    const response = await fetch("/api/timeline_post", {
        method: "POST",
        body: new FormData(form)
    });

    if (!response.ok) {
        if (response.status === 429) {
            message.textContent = "Rate limit reached. Please wait a minute before posting again.";
            return;
        }

        message.textContent = "Could not post that update.";
        return;
    }

    form.reset();
    message.textContent = "Posted.";
    await loadPosts();
});

loadPosts();
</script>
{% endblock %}
