{% extends "base.html" %}

{% block content %}
<div class="profile">
    <div id="profile-picture" class="profile-picture">
        <img src="{{ url_for('static', filename='img/logo.jpg') }}" alt="MLH Fellow profile photo">
    </div>
    <h1>{{ title }}</h1>
</div>

<section class="team">
    <h2 class="team-heading">Meet the Team</h2>
    <div class="team-members">
        {% for member in team_about %}
        <article class="team-member" style="--member-color: {{ member.color }}">
            <div class="team-member-photo">
                <img src="{{ url_for('static', filename='img/' ~ member.photo) }}" alt="Photo of {{ member.name }}">
            </div>
            <div class="team-member-info">
                <p class="team-member-name">{{ member.name }}</p>
                <p class="about-us-role">{{ member.role }}</p>
                <p class="about-us-bio">{{ member.bio }}</p>
                {% if member.links %}
                <div class="about-us-links">
                    {% for link in member.links %}
                    <a class="about-us-link" href="{{ link.url }}" target="_blank" rel="noopener">{{ link.label }}</a>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
        </article>
        {% endfor %}
    </div>
</section>
{% endblock %}
